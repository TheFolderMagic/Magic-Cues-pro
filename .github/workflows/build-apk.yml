name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  compile-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor Components
        run: npm install

      - name: Prepare Web Assets Directory
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp manifest.json www/ || true
          cp -r assets www/ || true

      - name: Set up Android Java Compiler
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android System Wrapper
        run: npx cap add android

      - name: Configure Android Permissions (Mic, NFC)
        run: |
          node -e '
          const fs = require("fs");
          const path = "android/app/src/main/AndroidManifest.xml";
          if (fs.existsSync(path)) {
            let content = fs.readFileSync(path, "utf8");
            const add = "\n    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n    <uses-permission android:name=\"android.permission.NFC\" />\n    <uses-feature android:name=\"android.hardware.nfc\" android:required=\"false\" />\n";
            content = content.replace("</manifest>", add + "</manifest>");
            fs.writeFileSync(path, content, "utf8");
            console.log("Manifest updated successfully.");
          } else {
            console.error("AndroidManifest.xml not found!");
            process.exit(1);
          }
          '

      - name: Run Jetifier (Translate legacy Cordova imports)
        run: |
          npm install jetifier
          npx jetifier

      - name: Inject Web Files Into Android Package
        run: npx cap sync android

      - name: Patch Legacy NFC Plugin Code (PendingIntent Flag Fix)
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          function patchFolder(dir) {
            if (!fs.existsSync(dir)) return;
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              if (fs.statSync(fullPath).isDirectory()) {
                patchFolder(fullPath);
              } else if (file.endsWith(".java")) {
                let content = fs.readFileSync(fullPath, "utf8");
                let changed = false;
                if (content.includes("PendingIntent.getActivity") && !content.includes("FLAG_MUTABLE") && !content.includes("FLAG_IMMUTABLE")) {
                  content = content.replace(
                    /PendingIntent\.getActivity\(([^,]+),([^,]+),([^,]+),(\s*)0\s*\)/g,
                    "PendingIntent.getActivity($1,$2,$3,$4PendingIntent.FLAG_MUTABLE)"
                  );
                  changed = true;
                }
                if (content.includes("PendingIntent.getBroadcast") && !content.includes("FLAG_MUTABLE") && !content.includes("FLAG_IMMUTABLE")) {
                  content = content.replace(
                    /PendingIntent\.getBroadcast\(([^,]+),([^,]+),([^,]+),(\s*)0\s*\)/g,
                    "PendingIntent.getBroadcast($1,$2,$3,$4PendingIntent.FLAG_MUTABLE)"
                  );
                  changed = true;
                }
                if (changed) {
                  fs.writeFileSync(fullPath, content, "utf8");
                  console.log("Patched PendingIntent inside: " + file);
                }
              }
            }
          }
          patchFolder("android/capacitor-cordova-android-plugins");
          '

      - name: Compile Native Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver Finished APK Package
        uses: actions/upload-artifact@v4
        with:
          name: Magician-App-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
