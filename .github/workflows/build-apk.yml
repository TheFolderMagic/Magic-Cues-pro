name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  compile-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Capacitor Components
        run: npm install

      - name: Prepare Web Assets Directory
        run: |
          mkdir -p docs
          cp index.html docs/ || true
          cp tutorial.js docs/ || true
          cp manifest.json docs/ || true
          cp Sortable.min.js docs/ || true
          cp wavesurfer.min.js docs/ || true
          cp regions.min.js docs/ || true
          cp export-helper.js docs/ || true
          cp legal.html docs/ || true
          cp Inter-Regular.woff2 docs/ || true
          cp Inter-Regular.ttf docs/ || true
          cp Inter-Bold.woff2 docs/ || true
          cp Inter-Bold.ttf docs/ || true
          cp MaterialSymbolsRounded.woff2 docs/ || true
          cp MaterialSymbolsRounded.ttf docs/ || true
          cp -r assets docs/ || true

      - name: Set up Android Java Compiler
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android System Wrapper
        run: npx cap add android

      - name: Force Target SDK to 35 (Android 15) and Auto-Increment Versioning
        run: |
          node -e '
          const fs = require("fs");
          const varPath = "android/variables.gradle";
          if (fs.existsSync(varPath)) {
            let content = fs.readFileSync(varPath, "utf8");
            content = content.replace(/compileSdkVersion\s*=\s*\d+/, "compileSdkVersion = 35");
            content = content.replace(/targetSdkVersion\s*=\s*\d+/, "targetSdkVersion = 35");
            fs.writeFileSync(varPath, content, "utf8");
            console.log("Forced variables.gradle to Target SDK 35");
          }
          const appGradlePath = "android/app/build.gradle";
          if (fs.existsSync(appGradlePath)) {
            let content = fs.readFileSync(appGradlePath, "utf8");
            content = content.replace(/compileSdkVersion\s*\d+/, "compileSdkVersion 35");
            content = content.replace(/targetSdkVersion\s*\d+/, "targetSdkVersion 35");
            content = content.replace(/versionCode\s*\d+/, "versionCode ${{ github.run_number }}");
            content = content.replace(/versionName\s*"[^"]*"/, "versionName \"1.0.${{ github.run_number }}\"");
            fs.writeFileSync(appGradlePath, content, "utf8");
            console.log("Forced app/build.gradle to Target SDK 35 and Version Code ${{ github.run_number }}");
          }
          '

      - name: Generate Custom App Icons
        run: |
          npm install @capacitor/assets
          npx @capacitor/assets generate --android

      - name: Inject NFC Native Bridge
        run: |
          PKG=$(node -e "console.log(require('./capacitor.config.json').appId)")
          PKG_PATH=$(echo "$PKG" | tr '.' '/')
          DIR="android/app/src/main/java/$PKG_PATH"
          mkdir -p "$DIR"
          rm -f "$DIR/MainActivity.java"
          sed "s/__PACKAGE__/$PKG/g" NfcBridge.java > "$DIR/NfcBridge.java"
          sed "s/__PACKAGE__/$PKG/g" MainActivity.java > "$DIR/MainActivity.java"

      - name: Configure Android Permissions (Mic, NFC)
        run: |
          node -e '
          const fs = require("fs");
          const path = "android/app/src/main/AndroidManifest.xml";
          if (fs.existsSync(path)) {
            let content = fs.readFileSync(path, "utf8");
            const add = "\n    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n    <uses-permission android:name=\"android.permission.NFC\" />\n    <uses-feature android:name=\"android.hardware.nfc\" android:required=\"false\" />\n    <queries>\n        <intent>\n            <action android:name=\"android.speech.RecognitionService\" />\n        </intent>\n    </queries>\n";
            content = content.replace("</manifest>", add + "</manifest>");
            fs.writeFileSync(path, content, "utf8");
            console.log("Manifest updated successfully.");
          } else {
            console.error("AndroidManifest.xml not found!");
            process.exit(1);
          }
          '

      - name: Inject Web Files Into Android Package
        run: npx cap sync android

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore

      - name: Compile and Sign Production App (Bundle & APK)
        run: |
          cd android
          chmod +x gradlew
          # Build and Sign AAB (For Play Store upload)
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_SIGNING_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_SIGNING_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_SIGNING_KEY_PASSWORD }}"
          # Build and Sign APK (For testing on your phone)
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_SIGNING_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_SIGNING_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_SIGNING_KEY_PASSWORD }}"

      - name: Deliver Production App Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: QFlow-Release-AAB-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Deliver Production APK
        uses: actions/upload-artifact@v4
        with:
          name: QFlow-Release-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
