name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  compile-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Capacitor Components
        run: npm install

      - name: Prepare Web Assets Directory
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp manifest.json www/ || true
          cp -r assets www/ || true

      - name: Set up Android Java Compiler
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android System Wrapper
        run: npx cap add android

      - name: Inject NFC Native Bridge
        run: |
          PKG=$(node -e "console.log(require('./capacitor.config.json').appId)")
          PKG_PATH=$(echo "$PKG" | tr '.' '/')
          DIR="android/app/src/main/java/$PKG_PATH"
          mkdir -p "$DIR"
          rm -f "$DIR/MainActivity.java"
          sed "s/__PACKAGE__/$PKG/g" NfcBridge.java > "$DIR/NfcBridge.java"
          sed "s/__PACKAGE__/$PKG/g" MainActivity.java > "$DIR/MainActivity.java"

      - name: Configure Android Permissions (Mic, NFC)
        run: |
          node -e '
          const fs = require("fs");
          const path = "android/app/src/main/AndroidManifest.xml";
          if (fs.existsSync(path)) {
            let content = fs.readFileSync(path, "utf8");
            const add = "\n    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n    <uses-permission android:name=\"android.permission.NFC\" />\n    <uses-feature android:name=\"android.hardware.nfc\" android:required=\"false\" />\n";
            content = content.replace("</manifest>", add + "</manifest>");
            fs.writeFileSync(path, content, "utf8");
            console.log("Manifest updated successfully.");
          } else {
            console.error("AndroidManifest.xml not found!");
            process.exit(1);
          }
          '

      - name: Inject Web Files Into Android Package
        run: npx cap sync android

      - name: Compile Native Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver Finished APK Package
        uses: actions/upload-artifact@v4
        with:
          name: Magician-App-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
