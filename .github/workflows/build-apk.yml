name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  compile-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor Components
        run: npm install

      - name: Prepare Web Assets Directory
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp manifest.json www/ || true
          cp -r assets www/ || true

      - name: Set up Android Java Compiler
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android System Wrapper
        run: npx cap add android

      - name: Inject Web Files Into Android Package
        run: npx cap sync android

      - name: Compile Native Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver Finished APK Package
        uses: actions/upload-artifact@v4
        with:
          name: Magician-App-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
