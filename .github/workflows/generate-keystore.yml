name: Generate Production Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore File
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias qflow_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Edward Brown, OU=Production, O=QFlow, L=Sigmaringen, S=Baden-Wuerttemberg, C=DE" \
            -storepass "QFlowSecretPass2026" \
            -keypass "QFlowSecretPass2026"

      - name: Print Base64 Encoded Version (For GitHub Secrets)
        run: |
          echo "==================== COPY THE LINE BELOW ===================="
          base64 -w 0 release.keystore
          echo ""
          echo "============================================================="

      - name: Upload Keystore File (For Personal Backup)
        uses: actions/upload-artifact@v4
        with:
          name: qflow-production-keystore
          path: release.keystore
