<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Magic Cues Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{--bg-top:#1c1c1e;--bg-bot:#09090b;--glass:rgba(30,30,35,.8);--glass-border:rgba(255,255,255,.1);--accent:#007AFF;--accent-glow:rgba(0,122,255,.3);--text-main:#f4f4f5;--text-muted:#a1a1aa;--danger:#ff453a;--modal-bg:#18181b;--input-bg:#09090b}
html[data-theme="light"]{--bg-top:#f4f4f7;--bg-bot:#e2e2e7;--glass:rgba(255,255,255,.9);--glass-border:rgba(0,0,0,.1);--accent-glow:rgba(0,122,255,.2);--text-main:#1c1c1e;--text-muted:#636366;--modal-bg:#fff;--input-bg:#e2e2e7}
html[data-theme="high-vis"]{--bg-top:#000;--bg-bot:#000;--glass:#000;--glass-border:#ff0;--accent:#ff0;--accent-glow:rgba(255,255,0,.3);--text-main:#fff;--text-muted:#ff0;--modal-bg:#000;--input-bg:#000;--danger:#ff453a}
body{background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bot) 100%) fixed;color:var(--text-main);font-family:'Inter',sans-serif;padding:24px;margin:0;padding-bottom:140px;overflow-x:hidden;-webkit-user-select:none;opacity:0;transition:opacity .3s ease}
body.modal-open{overflow:hidden}
.material-symbols-rounded{font-variation-settings:'FILL' 1,'wght' 400}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.header-actions{display:flex;gap:8px}
h1{font-weight:700;font-size:28px;letter-spacing:-1px;margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 12px 8px 0;border-radius:12px}
h1:active{opacity:0.7}
h2{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin:35px 0 15px 5px;font-weight:800}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .2s;-webkit-tap-highlight-color:transparent}
.icon-btn{background:var(--glass);color:var(--text-main);width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;border:1px solid var(--glass-border)}
.master-grid{display:grid;grid-template-columns:1fr 64px 64px;gap:12px;margin-bottom:12px}
#master-play{background:var(--accent);color:#fff;padding:22px;font-size:18px;font-weight:700;border-radius:20px;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 10px 20px var(--accent-glow)}
html[data-theme="high-vis"] #master-play{color:#000}
#pause-btn, #mic-btn{background:var(--glass);color:var(--text-main);border-radius:20px;border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center}
.mic-active{background:var(--danger)!important;color:#fff!important;border-color:var(--danger)!important;box-shadow:0 0 15px rgba(255,69,58,.5)}
.mic-paused{background:var(--text-muted)!important;color:#fff!important;border-color:var(--text-muted)!important;}
#speech-debug{display:none; text-align:center; color:var(--text-muted); font-size:13px; margin-bottom:24px; padding:10px; background:var(--glass); border-radius:12px; border:1px solid var(--glass-border);}
.action-row{display:flex;gap:10px;margin-bottom:30px}
.action-btn{flex:1;background:var(--glass);color:var(--text-main);padding:16px;border-radius:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;border:1px solid var(--glass-border)}
#track-list{display:flex;flex-direction:column;gap:12px}
.tile, .cue-pad{background:var(--glass);border-radius:20px;position:relative;overflow:hidden;border:1px solid var(--glass-border);backdrop-filter:blur(10px);transition:all .3s}
.is-playing{border:1px solid var(--accent)!important;box-shadow:0 0 20px var(--accent-glow)}
html[data-theme="high-vis"] .is-playing{border-color:#ff0!important}
.tile-content, .cue-pad span, .pad-settings-trigger{position:relative;z-index:2}
.tile-content{padding:22px;display:flex;align-items:center;gap:16px}
.tile-info{flex:1;min-width:0}
.tile-name-text{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent-glow);width:0%;z-index:1;pointer-events:none;display:none}
body.show-progress .is-playing .progress-fill{display:block}
#instant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.cue-pad{aspect-ratio:1.5/1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.cue-pad span{font-size:15px;font-weight:700;line-height:1.3}
.pad-settings-trigger{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:10px;background:rgba(128,128,128,.2);color:var(--text-main);display:flex;align-items:center;justify-content:center}
.locked .drag-handle,.locked .action-row,.locked .edit-trigger,.locked .pad-settings-trigger,.locked #queue-label{display:none!important}
.locked .tile:not(.is-current){display:none}
.locked .is-current{border:2px solid var(--accent)}
dialog{background:var(--modal-bg);color:var(--text-main);border:1px solid var(--glass-border);border-radius:32px;padding:30px;width:calc(100% - 32px);max-width:400px;margin:auto;box-shadow:0 40px 80px rgba(0,0,0,.8);backdrop-filter:blur(20px)}
dialog::backdrop{background:rgba(0,0,0,.85);backdrop-filter:blur(4px)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.modal-title{font-size:22px;font-weight:800}
.setting-row{background:rgba(128,128,128,.1);padding:16px;border-radius:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.setting-row label{font-size:15px;font-weight:600;color:var(--text-main)}
.segmented-control{display:flex;width:100%;background:var(--input-bg);border-radius:12px;border:1px solid var(--glass-border);overflow:hidden;margin-top:10px}
.segmented-control button{flex:1;padding:12px;background:transparent;color:var(--text-muted);font-size:14px;font-weight:600;border:none;border-radius:0}
.segmented-control button.active{background:var(--accent);color:#fff}
html[data-theme="high-vis"] .segmented-control button.active{color:#000}
input[type="number"], input[type="text"]{background:var(--input-bg);color:var(--accent);border:1px solid var(--glass-border);font-size:15px;font-weight:700;border-radius:10px;padding:8px 12px;width:90px;text-align:right;outline:none}
input[type="text"]{width:100%;text-align:left;color:var(--text-main);margin-bottom:15px;padding:16px;font-size:16px;}
input[type="range"]{width:100%;accent-color:var(--accent)}
details{background:rgba(128,128,128,.1);border-radius:18px;margin-bottom:12px;overflow:hidden}
summary{padding:16px;font-weight:700;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;user-select:none}
summary::after{content:'expand_more';font-family:'Material Symbols Rounded';font-size:24px;transition:transform .3s}
details[open] summary::after{transform:rotate(180deg)}
.details-content{padding:0 16px 16px 16px;display:flex;flex-direction:column;gap:12px}
.mini-row{display:flex;justify-content:space-between;align-items:center}
.mini-row label{font-size:14px;font-weight:500;color:var(--text-main)}
.danger-zone{margin-top:20px;border-top:1px solid var(--glass-border);padding-top:20px}
.btn-delete{width:100%;padding:18px;border-radius:16px;background:rgba(255,69,58,.15);color:var(--danger);font-weight:700;font-size:16px;border:1px solid var(--danger)}
#file-input{display:none}
.project-item{padding:16px;background:var(--input-bg);border:1px solid var(--glass-border);border-radius:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:transform 0.1s;user-select:none}
.project-item:active{transform:scale(0.98)}
.project-item.active{border-color:var(--accent);background:var(--accent-glow)}
</style>
</head>
<body class="unlocked show-progress">

<header>
    <h1 onclick="haptic(15); openProjects()"><span id="header-title-text">Magic Cues</span> <span class="material-symbols-rounded" style="font-size:28px">expand_more</span></h1>
    <div class="header-actions">
        <button class="icon-btn" onclick="haptic(15); openModal('app-settings')"><span class="material-symbols-rounded">settings</span></button>
        <button class="icon-btn" onclick="haptic(15); toggleLock()"><span class="material-symbols-rounded" id="lock-icon">lock_open</span></button>
    </div>
</header>

<div class="master-grid">
    <button id="master-play" onclick="playNextCue()"><span class="material-symbols-rounded">play_arrow</span><span id="play-text">Next Cue</span></button>
    <button id="mic-btn" onclick="haptic(15); toggleMic()"><span class="material-symbols-rounded" id="mic-icon">mic_off</span></button>
    <button id="pause-btn" onclick="haptic(15); toggleGlobalPause()"><span class="material-symbols-rounded" id="pause-icon">pause</span></button>
</div>

<div id="speech-debug">Heard: <span id="speech-text" style="color:var(--text-main);font-weight:600">...</span></div>

<div class="action-row">
    <button class="action-btn" onclick="haptic(15); $('file-input').click()"><span class="material-symbols-rounded">add_circle</span> Add Cue</button>
    <button class="action-btn" onclick="haptic([15, 30, 15]); triggerReset()"><span class="material-symbols-rounded">restart_alt</span> Reset</button>
</div>
<input type="file" id="file-input" accept="audio/*" multiple onchange="handleFiles(this)">
<div id="queue-container"><h2 id="queue-label">Main Queue</h2><div id="track-list"></div></div>
<h2>Instant Cues</h2><div id="instant-grid"></div>

<dialog id="projects-modal">
    <div class="modal-header"><span class="modal-title">My Shows</span><button class="icon-btn" style="width:36px;height:36px;border-radius:12px" onclick="haptic(10); closeModal('projects-modal')"><span class="material-symbols-rounded" style="font-size:20px">close</span></button></div>
    <div id="projects-list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
    <button class="action-btn" style="width:100%" onclick="haptic(15); closeModal('projects-modal'); openModal('new-show-modal')"><span class="material-symbols-rounded">add</span> New Show</button>
</dialog>

<dialog id="new-show-modal">
    <div class="modal-header"><span class="modal-title">Create Show</span></div>
    <input type="text" id="new-show-name" placeholder="Enter show name..." autocomplete="off">
    <div style="display:flex;gap:12px;">
        <button class="action-btn" style="margin:0;border:none" onclick="haptic(10); closeModal('new-show-modal')">Cancel</button>
        <button class="action-btn" style="margin:0;flex:1;background:var(--accent);color:#fff;border:none" onclick="haptic(15); createNewProject()">Create</button>
    </div>
</dialog>

<dialog id="edit-show-modal">
    <div class="modal-header"><span class="modal-title">Edit Show</span></div>
    <input type="text" id="edit-show-name" autocomplete="off">
    <div style="display:flex;gap:12px;margin-bottom:12px">
        <button class="action-btn" style="margin:0;border:none" onclick="haptic(10); closeModal('edit-show-modal')">Cancel</button>
        <button class="action-btn" style="margin:0;flex:1;background:var(--accent);color:#fff;border:none" onclick="haptic(15); saveShowEdit()">Save</button>
    </div>
    <button class="btn-delete" onclick="haptic([30, 50, 30]); deleteShow()">Delete Show</button>
</dialog>

<dialog id="app-settings">
    <div class="modal-header"><span class="modal-title">App Settings</span><button class="icon-btn" style="width:36px;height:36px;border-radius:12px" onclick="haptic(10); closeModal('app-settings')"><span class="material-symbols-rounded" style="font-size:20px">close</span></button></div>
    <div class="setting-row" style="flex-direction:column;align-items:flex-start"><label style="margin-bottom:5px">Speech Language</label>
        <div class="segmented-control" id="lang-controls">
            <button id="lang-en" class="active" onclick="haptic(10); setLang('en-US')">English</button>
            <button id="lang-de" onclick="haptic(10); setLang('de-DE')">Deutsch</button>
        </div>
    </div>
    <div class="setting-row" style="flex-direction:column;align-items:flex-start"><label style="margin-bottom:5px">Theme</label>
        <div class="segmented-control" id="theme-controls"><button id="btn-dark" class="active" onclick="haptic(10); setTheme('dark')">Dark</button><button id="btn-light" onclick="haptic(10); setTheme('light')">Light</button><button id="btn-vis" onclick="haptic(10); setTheme('high-vis')">High-Vis</button></div>
    </div>
    <div class="setting-row"><label>Show Progress Fill</label><input type="checkbox" id="progress-toggle" onchange="haptic(10); toggleProgress(this.checked)" style="width:20px;height:20px;accent-color:var(--accent)"></div>
    <div class="setting-row"><label>Confirm Reset</label><input type="checkbox" id="confirm-reset-toggle" onchange="haptic(10); updConfRes(this.checked)" style="width:20px;height:20px;accent-color:var(--accent)"></div>
    <div class="setting-row"><label>Auto-Pause Mic During Audio</label><input type="checkbox" id="auto-pause-mic-toggle" onchange="haptic(10); updAutoPauseMic(this.checked)" style="width:20px;height:20px;accent-color:var(--accent)"></div>
    <div class="setting-row" style="border-top:1px solid var(--glass-border); margin-top:10px; padding-top:20px;"><label>UI Size</label><input type="range" min="50" max="150" step="25" value="100" id="ui-size-slider" oninput="haptic(10)" onchange="updUISize(this.value)" style="width:120px"></div>
</dialog>

<dialog id="settings-modal">
    <div class="modal-header"><span class="modal-title">Cue Settings</span><button class="icon-btn" style="width:36px;height:36px;border-radius:12px" onclick="haptic(10); closeModal('settings-modal')"><span class="material-symbols-rounded" style="font-size:20px">close</span></button></div>
    <div id="modal-content"></div>
    <div class="danger-zone"><button class="btn-delete" onclick="haptic([30, 50, 30]); deleteTrack()">Delete Cue</button></div>
</dialog>

<dialog id="reset-modal">
    <div class="modal-header"><span class="modal-title">Reset Show?</span></div>
    <p style="color:var(--text-muted);margin:0 0 25px 0;font-size:15px;line-height:1.5;">Are you sure you want to stop all audio and reset the queue?</p>
    <div style="display:flex;gap:12px;">
        <button class="action-btn" style="margin:0;border:none" onclick="haptic(10); closeModal('reset-modal')">Cancel</button>
        <button class="btn-delete" style="margin:0;flex:1" onclick="haptic([50, 50, 50]); executeReset()">Reset Show</button>
    </div>
</dialog>

<script>
const $ = id => document.getElementById(id);
let tracks=[], curIdx=0, locked=!1, activeId=null, activeCues=new Map(), activePads=new Map(), paused=!1;
let db, projectsList=[], curProjId='default', editProjId=null;
let settings = JSON.parse(localStorage.getItem('mc_settings')) || {showProgress: true, theme: 'dark', lang: 'en-US', uiSize: 100, confirmReset: true, autoPauseMic: true};

// HAPTIC ENGINE
const haptic = (pattern = 15) => { if (navigator.vibrate) navigator.vibrate(pattern); };

const openModal = id => { document.body.classList.add('modal-open'); $(id).showModal(); };
const closeModal = id => { $(id).close(); document.body.classList.remove('modal-open'); };

const setLang = (l) => { settings.lang = l; saveSettings(); document.querySelectorAll('#lang-controls button').forEach(b => b.classList.remove('active')); $(l === 'en-US' ? 'lang-en' : 'lang-de').classList.add('active'); if (recognition) recognition.lang = l; };
const applySettings = () => { setTheme(settings.theme); setLang(settings.lang); $('progress-toggle').checked=settings.showProgress; toggleProgress(settings.showProgress); $('ui-size-slider').value = settings.uiSize || 100; $('confirm-reset-toggle').checked = settings.confirmReset !== false; $('auto-pause-mic-toggle').checked = settings.autoPauseMic !== false; applyUISize(); };
const saveSettings = () => { localStorage.setItem('mc_settings', JSON.stringify(settings)); };
const setTheme = t => { document.documentElement.setAttribute('data-theme',t); document.querySelectorAll('#theme-controls button').forEach(b=>b.classList.remove('active')); $(`btn-${t==='high-vis'?'vis':t}`).classList.add('active'); settings.theme=t; saveSettings(); };
const toggleProgress = v => { document.body.classList.toggle('show-progress', v); settings.showProgress=v; saveSettings(); };
const updUISize = v => { settings.uiSize=v; saveSettings(); applyUISize(); };
const applyUISize = () => { document.body.style.zoom = (settings.uiSize || 100) + '%'; };
const updConfRes = v => { settings.confirmReset=v; saveSettings(); };
const updAutoPauseMic = v => { settings.autoPauseMic=v; saveSettings(); };

const initDB = () => {
    let req = indexedDB.open('MagicCuesProDB', 4);
    req.onupgradeneeded = e => { if(!e.target.result.objectStoreNames.contains('store')) e.target.result.createObjectStore('store'); };
    req.onsuccess = e => {
        db = e.target.result;
        let st = db.transaction('store', 'readwrite').objectStore('store');
        st.get('projectList').onsuccess = res => {
            projectsList = res.target.result || [{id: 'default', name: 'Main Show'}];
            if(!res.target.result) st.put(projectsList, 'projectList');
            curProjId = localStorage.getItem('mc_curProj') || projectsList[0].id;
            $('header-title-text').innerText = (projectsList.find(x=>x.id===curProjId) || projectsList[0]).name;
            st.get('proj_'+curProjId).onsuccess = r => { tracks = r.target.result ? r.target.result.map(t => ({...t, blobUrl: URL.createObjectURL(t.file)})) : []; render(); };
        };
    };
};
const saveData = () => { if(!db) return; db.transaction('store','readwrite').objectStore('store').put(tracks.map(t => ({id:t.id, name:t.name, type:t.type, delay:t.delay, fadeIn:t.fadeIn, fadeOut:t.fadeOut, volume:t.volume, trimStart:t.trimStart, trimEnd:t.trimEnd, autoFollow:t.autoFollow, overlap:t.overlap, postDelay:t.postDelay, triggerPhrase:t.triggerPhrase||'', globalVoice:t.globalVoice||false, file:t.file})), 'proj_'+curProjId); };

const render = () => {
    $('track-list').innerHTML=''; $('instant-grid').innerHTML=''; let qIdx=1;
    tracks.forEach((t,i)=>{
        if(t.type==='queue'){
            let el=document.createElement('div'); el.className=`tile ${i===curIdx?'is-current':''} ${activeCues.has(t.id)?'is-playing':''}`; el.id=`tile-${t.id}`;
            let micIndicator = t.triggerPhrase ? `<span class="material-symbols-rounded" style="color:var(--text-muted);font-size:16px;vertical-align:middle;margin-left:8px">mic</span>` : '';
            if(t.globalVoice) micIndicator += `<span class="material-symbols-rounded" style="color:var(--accent);font-size:14px;vertical-align:middle;margin-left:2px">public</span>`;
            el.innerHTML=`<div class="progress-fill" id="prog-${t.id}"></div><div class="tile-content"><span class="material-symbols-rounded drag-handle">drag_indicator</span><div class="tile-info" style="cursor:pointer" onclick="if(!locked)playCue('${t.id}')"><span class="tile-name-text">${qIdx++}. ${t.name}${micIndicator}</span></div><button class="icon-btn edit-trigger" style="width:40px;height:40px" onclick="haptic(10); openSet('${t.id}')"><span class="material-symbols-rounded" style="font-size:20px">settings</span></button></div>`;
            $('track-list').appendChild(el);
        }else{
            let el=document.createElement('div'); el.className=`cue-pad ${activePads.has(t.id)?'is-playing':''}`; el.id=`tile-${t.id}`; el.onclick=()=>{ haptic(20); playPad(t); };
            let micIndicator = t.triggerPhrase ? `<span class="material-symbols-rounded" style="color:var(--text-muted);font-size:14px;vertical-align:middle;margin-left:4px">mic</span>` : '';
            el.innerHTML=`<div class="progress-fill" id="prog-${t.id}"></div><span>${t.name}${micIndicator}</span><div class="pad-settings-trigger edit-trigger" onclick="event.stopPropagation(); haptic(10); openSet('${t.id}')"><span class="material-symbols-rounded" style="font-size:18px">settings</span></div>`;
            $('instant-grid').appendChild(el);
        }
    });
};

let pressTm, didLongPress = false;
const startPress = id => { didLongPress = false; pressTm = setTimeout(() => { haptic(30); didLongPress = true; editProjId=id; $('edit-show-name').value=projectsList.find(x=>x.id===id).name; openModal('edit-show-modal'); }, 600); };
const cancelPress = () => clearTimeout(pressTm);
const handleProjClick = id => { cancelPress(); if(!didLongPress) { haptic(15); switchProject(id); } };

const openProjects = () => { $('projects-list-container').innerHTML = projectsList.map(p => `<div class="project-item ${p.id===curProjId?'active':''}" onpointerdown="startPress('${p.id}')" onpointerup="cancelPress()" onpointerleave="cancelPress()" onclick="handleProjClick('${p.id}')"><span style="font-weight:700">${p.name}</span> ${p.id===curProjId?'<span class="material-symbols-rounded">check_circle</span>':''}</div>`).join(''); openModal('projects-modal'); };
const createNewProject = () => { let n=$('new-show-name').value.trim(); if(!n) return; let nId='proj_'+Date.now(); projectsList.push({id: nId, name: n}); db.transaction('store','readwrite').objectStore('store').put(projectsList, 'projectList'); closeModal('new-show-modal'); $('new-show-name').value=''; switchProject(nId); };
const saveShowEdit = () => { let n=$('edit-show-name').value.trim(); if(n && editProjId){ let p = projectsList.find(x=>x.id===editProjId); if(p) p.name = n; db.transaction('store','readwrite').objectStore('store').put(projectsList, 'projectList'); if(editProjId===curProjId) $('header-title-text').innerText=n; } closeModal('edit-show-modal'); openProjects(); };
const deleteShow = () => { if(projectsList.length<=1) return alert("Cannot delete last show."); projectsList=projectsList.filter(x=>x.id!==editProjId); let tx = db.transaction('store','readwrite'); tx.objectStore('store').put(projectsList, 'projectList'); tx.objectStore('store').delete('proj_'+editProjId); closeModal('edit-show-modal'); if(curProjId===editProjId) switchProject(projectsList[0].id); else openProjects(); };
const switchProject = id => { if(curProjId===id) return; executeReset(); tracks.forEach(t=>{if(t.blobUrl)URL.revokeObjectURL(t.blobUrl);}); tracks = []; curProjId=id; localStorage.setItem('mc_curProj', id); $('header-title-text').innerText=projectsList.find(x=>x.id===id).name; closeModal('projects-modal'); db.transaction('store').objectStore('store').get('proj_'+id).onsuccess=r=>{ tracks=r.target.result?r.target.result.map(t=>({...t,blobUrl:URL.createObjectURL(t.file)})):[]; render(); }; };

const triggerReset = () => { if(settings.confirmReset !== false) openModal('reset-modal'); else executeReset(); };
const executeReset = () => { closeModal('reset-modal'); curIdx=0; activeCues.forEach(a=>{if(a.fadeInt)clearInterval(a.fadeInt); a.pause();}); activeCues.clear(); activePads.forEach(a=>{if(a.fadeInt)clearInterval(a.fadeInt); a.pause();}); activePads.clear(); paused=!1; $('play-text').innerText='Next Cue'; render(); manageSmartMic(); };
const handleFiles = inp => { Array.from(inp.files).forEach(f=>tracks.push({id:'id'+Date.now()+Math.random().toString(36).substr(2,5),name:f.name.replace(/\.[^/.]+$/,""),blobUrl:URL.createObjectURL(f),type:'queue',delay:0,fadeIn:0,fadeOut:0,volume:1,trimStart:0,trimEnd:0,autoFollow:false,overlap:0,postDelay:0,triggerPhrase:'',globalVoice:false,file:f})); render(); saveData(); inp.value=''; };

const openSet = id => {
    activeId=id; let t=tracks.find(x=>x.id===id); let isQ = t.type === 'queue';
    $('modal-content').innerHTML=`
    <div class="setting-row" style="flex-direction:column;align-items:flex-start;padding-bottom:20px"><label>Cue Type</label><div class="segmented-control"><button class="${isQ?'active':''}" onclick="haptic(10); updTrk('type','queue')">Main</button><button class="${t.type==='pad'?'active':''}" onclick="haptic(10); updTrk('type','pad')">Instant</button></div></div>
    <div class="setting-row"><label>Volume</label><input type="range" min="0" max="1" step="0.05" value="${t.volume??1}" oninput="haptic(5); updTrk('volume',this.value)"></div>
    
    <details><summary onclick="haptic(10)">Voice Triggers</summary><div class="details-content">
        <div class="mini-row"><label>Trigger Phrase</label><input type="text" style="width:140px;margin:0;padding:8px 12px;font-size:14px;text-align:right;" placeholder="e.g. action" value="${t.triggerPhrase||''}" oninput="updTrk('triggerPhrase',this.value)"></div>
        <div style="border-top:1px solid var(--glass-border);margin:5px 0"></div>
        <div class="mini-row"><label>Global Trigger</label><input type="checkbox" ${t.globalVoice?'checked':''} onchange="haptic(10); updTrk('globalVoice',this.checked)" style="width:20px;height:20px;accent-color:var(--accent)"></div>
    </div></details>

    <details><summary onclick="haptic(10)">Advanced Audio Settings</summary><div class="details-content">
        <div class="mini-row"><label>Manual Pre-Delay (s)</label><input type="number" step="0.5" value="${t.delay||0}" onchange="haptic(10); updTrk('delay',this.value)"></div>
        <div class="mini-row"><label>Fade In (s)</label><input type="number" step="0.5" value="${t.fadeIn||0}" onchange="haptic(10); updTrk('fadeIn',this.value)"></div>
        <div class="mini-row"><label>Fade Out (s)</label><input type="number" step="0.5" value="${t.fadeOut||0}" onchange="haptic(10); updTrk('fadeOut',this.value)"></div>
        <div style="border-top:1px solid var(--glass-border);margin:5px 0"></div>
        <div class="mini-row"><label>Trim Start (s)</label><input type="number" step="0.5" value="${t.trimStart||0}" onchange="haptic(10); updTrk('trimStart',this.value)"></div>
        <div class="mini-row"><label>Trim End (s)</label><input type="number" step="0.5" value="${t.trimEnd||0}" onchange="haptic(10); updTrk('trimEnd',this.value)"></div>
        ${isQ ? `<div style="border-top:1px solid var(--glass-border);margin:5px 0"></div>
        <div class="mini-row"><label style="color:var(--accent);font-weight:700">Auto-Follow Next</label><input type="checkbox" ${t.autoFollow?'checked':''} onchange="haptic(10); updTrk('autoFollow',this.checked)" style="width:20px;height:20px;accent-color:var(--accent)"></div>
        <div class="mini-row"><label>Overlap (s)</label><input type="number" step="0.5" value="${t.overlap||0}" onchange="haptic(10); updTrk('overlap',this.value)"></div>
        <div class="mini-row"><label>Post-Delay (s)</label><input type="number" step="0.5" value="${t.postDelay||0}" onchange="haptic(10); updTrk('postDelay',this.value)"></div>` : ''}
    </div></details>`;
    openModal('settings-modal');
};

const updTrk = (k,v) => { let t=tracks.find(x=>x.id===activeId); if(t){ let val = (k==='type'||k==='autoFollow'||k==='triggerPhrase'||k==='globalVoice') ? v : parseFloat(v); t[k] = val; if(k==='volume'){ if(activeCues.has(activeId)) activeCues.get(activeId).volume = val; if(activePads.has(activeId)) activePads.get(activeId).volume = val; } if(k==='type') closeModal('settings-modal'); render(); saveData(); } };
const deleteTrack = () => { let t=tracks.find(x=>x.id===activeId); if(t&&t.blobUrl)URL.revokeObjectURL(t.blobUrl); tracks=tracks.filter(x=>x.id!==activeId); closeModal('settings-modal'); render(); saveData(); };

const playCue = id => { if(locked)return; haptic(20); let q=tracks.filter(x=>x.type==='queue'), idx=q.findIndex(x=>x.id===id); if(idx>-1){curIdx=idx; triggerSequence(q[curIdx++]);} };
const playNextCue = (isLayered=false) => { let q=tracks.filter(x=>x.type==='queue'); if(curIdx>=q.length)return; if(!isLayered) haptic(25); triggerSequence(q[curIdx++], isLayered); };

const triggerSequence = (t, isLayered) => {
    if(t.delay>0 && !isLayered){ $('play-text').innerText=`Wait ${t.delay}s...`; setTimeout(()=>runAud(t, isLayered), t.delay*1000); }
    else runAud(t, isLayered); render();
};

const runAud = (t, isLayered) => { 
    if(!isLayered){ activeCues.forEach(a => { a.onended=null; if(a.fadeInt)clearInterval(a.fadeInt); a.pause(); }); activeCues.clear(); }
    let a = new Audio(t.blobUrl); a.trkId = t.id; activeCues.set(t.id, a);
    paused = !1; let vol = t.volume ?? 1; a.currentTime = t.trimStart || 0;
    
    if(t.fadeIn>0){ a.volume=0; let v=0, s=0.05/t.fadeIn; a.fadeInt=setInterval(()=>{v+=s; if(v>=vol){v=vol; clearInterval(a.fadeInt);} if(activeCues.has(t.id))a.volume=v;},50); } 
    else a.volume=vol;

    let fadingOut=!1, afTriggered=!1;
    let overlap = parseFloat(t.overlap) || 0; let postDelay = parseFloat(t.postDelay) || 0;

    a.ontimeupdate = () => {
        let dur = t.trimEnd ? t.trimEnd : (a.duration || 0); if(dur === 0) return;
        let progEl = $('prog-'+t.id); if(progEl) progEl.style.width = Math.max(0, Math.min(100, ((a.currentTime - (t.trimStart||0)) / (dur - (t.trimStart||0)) * 100))) + '%';
        if(t.autoFollow && overlap > 0 && !afTriggered && a.currentTime >= (dur - overlap)) { afTriggered=!0; playNextCue(true); }
        if(t.fadeOut>0 && !fadingOut && a.currentTime >= (dur - t.fadeOut)) {
            fadingOut=!0; if(a.fadeInt)clearInterval(a.fadeInt); let v=a.volume, s=v/(t.fadeOut*20);
            a.fadeInt=setInterval(()=>{v-=s; if(v<=0){v=0;clearInterval(a.fadeInt);} if(activeCues.has(t.id))a.volume=v;},50);
        }
        if(a.currentTime >= dur && !a.paused){ a.pause(); if(a.onended) a.onended(); }
    };

    a.play(); $('pause-icon').innerText='pause'; $('play-text').innerText=t.name; 
    manageSmartMic(); 
    
    a.onended = () => { 
        if(t.autoFollow && !afTriggered) {
            afTriggered = !0;
            if(postDelay > 0) { $('play-text').innerText=`Wait ${postDelay}s...`; setTimeout(()=>playNextCue(false), postDelay*1000); } 
            else { playNextCue(false); }
        }
        activeCues.delete(t.id); if(activeCues.size === 0) { $('play-text').innerText='Next Cue'; } 
        render(); manageSmartMic(); 
    }; 
    render(); 
};

const playPad = t => { 
    if(activePads.has(t.id)){ let oldA = activePads.get(t.id); if(oldA.fadeInt)clearInterval(oldA.fadeInt); oldA.pause(); activePads.delete(t.id); render(); manageSmartMic(); return; }
    let a=new Audio(t.blobUrl); a.currentTime=t.trimStart||0; a.volume=t.volume??1;
    activePads.set(t.id, a); render();
    a.ontimeupdate = () => {
        let dur = t.trimEnd ? t.trimEnd : a.duration;
        let progEl = $('prog-'+t.id); if(progEl) progEl.style.width = Math.max(0, Math.min(100, ((a.currentTime - (t.trimStart||0)) / (dur - (t.trimStart||0)) * 100))) + '%';
        if(a.currentTime >= dur){ a.pause(); activePads.delete(t.id); render(); manageSmartMic(); }
    };
    a.play(); manageSmartMic();
};

const toggleGlobalPause = () => { 
    paused=!paused; 
    if(paused){ activeCues.forEach(a=>a.pause()); activePads.forEach(a=>a.pause()); $('pause-icon').innerText='play_arrow'; }
    else{ activeCues.forEach(a=>a.play()); activePads.forEach(a=>a.play()); $('pause-icon').innerText='pause'; } 
    manageSmartMic();
};
const toggleLock = () => { locked=!locked; document.body.className=locked?'locked show-progress':'unlocked show-progress'; $('lock-icon').innerText=locked?'lock':'lock_open'; render(); };

// --- SPEECH RECOGNITION (WITH SMART MIC MANAGEMENT) ---
let recognition; let isListening = false; let speechErrorOccurred = false; let processedTranscriptLength = 0;
let userWantsMicOn = false;

const initSpeech = () => {
    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!window.SpeechRecognition) return;
    recognition = new window.SpeechRecognition(); recognition.continuous = true; recognition.interimResults = true;
    recognition.lang = settings.lang;
    
    recognition.onstart = () => { processedTranscriptLength = 0; $('mic-btn').classList.add('mic-active'); $('mic-btn').classList.remove('mic-paused'); $('mic-icon').innerText = 'mic'; $('speech-text').innerText = 'Listening...'; };

    recognition.onresult = (event) => {
        let fullTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) { fullTranscript += event.results[i][0].transcript; }
        $('speech-text').innerText = fullTranscript;
        
        let newAudioText = fullTranscript.substring(processedTranscriptLength);
        let searchSpace = newAudioText.toLowerCase().replace(/[.,!?]/g, '').trim();
        if(!searchSpace) return;
        let triggered = false;

        let q = tracks.filter(x=>x.type==='queue');
        if(curIdx < q.length) {
            let nextCue = q[curIdx];
            if(nextCue && nextCue.triggerPhrase && !nextCue.globalVoice) {
                let cleanTrigger = nextCue.triggerPhrase.toLowerCase().replace(/[.,!?]/g, '').trim();
                if(cleanTrigger && searchSpace.includes(cleanTrigger)) { haptic(30); playNextCue(); triggered = true; }
            }
        }
        if(!triggered) {
            for(let i=0; i<tracks.length; i++) {
                let t = tracks[i];
                if(t.globalVoice && t.triggerPhrase) {
                    let cleanTrigger = t.triggerPhrase.toLowerCase().replace(/[.,!?]/g, '').trim();
                    if(cleanTrigger && searchSpace.includes(cleanTrigger)) {
                        haptic(30);
                        if(t.type === 'queue') playCue(t.id); else playPad(t);
                        triggered = true; break;
                    }
                }
            }
        }
        if(triggered) { processedTranscriptLength = fullTranscript.length; }
    };
    
    recognition.onerror = (event) => { speechErrorOccurred = true; if(userWantsMicOn && !audioIsPlaying()) { turnMicOffUI(); userWantsMicOn = false;} };
    recognition.onend = () => { 
        processedTranscriptLength = 0; 
        if(isListening && userWantsMicOn && !speechErrorOccurred) try { recognition.start(); } catch(e){} 
        speechErrorOccurred = false; 
    };
};

const audioIsPlaying = () => { return activeCues.size > 0 || activePads.size > 0; };

const manageSmartMic = () => {
    if(!userWantsMicOn || !recognition) return;
    
    if(settings.autoPauseMic && audioIsPlaying()) {
        isListening = false;
        try { recognition.stop(); } catch(e) {}
        $('mic-btn').classList.remove('mic-active');
        $('mic-btn').classList.add('mic-paused');
        $('mic-icon').innerText = 'mic_off';
        $('speech-text').innerText = 'Mic paused during playback...';
    } else {
        if(!isListening) {
            isListening = true;
            try { recognition.start(); } catch(e) {}
        }
    }
};

const turnMicOffUI = () => { isListening = false; userWantsMicOn = false; $('mic-btn').classList.remove('mic-active'); $('mic-btn').classList.remove('mic-paused'); $('mic-icon').innerText = 'mic_off'; $('speech-debug').style.display = 'none'; $('speech-text').innerText = '...'; }

const toggleMic = () => {
    userWantsMicOn = !userWantsMicOn;
    if(userWantsMicOn) {
        $('speech-debug').style.display = 'block';
        if(settings.autoPauseMic && audioIsPlaying()) {
            $('mic-btn').classList.add('mic-paused'); $('speech-text').innerText = 'Mic paused during playback...';
        } else {
            isListening = true; speechErrorOccurred = false; processedTranscriptLength = 0;
            try { recognition.start(); } catch(e) {}
        }
    } else {
        isListening = false; try { recognition.stop(); } catch(e) {} turnMicOffUI();
    }
};

new Sortable($('track-list'),{
    handle:'.drag-handle', animation:250,
    onEnd: () => {
        haptic(10);
        let ids = Array.from($('track-list').children).map(e=>e.id.replace('tile-',''));
        let q = tracks.filter(t=>t.type==='queue'); let p = tracks.filter(t=>t.type==='pad');
        q.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id)); tracks = [...q,...p]; saveData(); render();
    }
});

document.fonts.ready.then(()=>document.body.style.opacity="1");
applySettings();
initDB();
initSpeech();
</script>
</body>
</html>
