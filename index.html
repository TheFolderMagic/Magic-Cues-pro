<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Cue Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        header { background: var(--card); padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 6px -1px #0004; }
        .btn { background: #334155; border: none; color: white; padding: 10px 16px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); }
        
        .cue-list { padding: 1rem; display: flex; flex-direction: column; gap: 12px; }
        .cue-card { background: var(--card); padding: 1rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
        .cue-info { flex: 1; }
        .cue-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; }
        .cue-meta { font-size: 0.8rem; opacity: 0.6; display: flex; gap: 10px; }
        
        .play-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; color: #000; font-size: 2rem; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; border-radius: 20px; padding: 1.5rem; max-height: 90vh; overflow-y: auto; }
        
        input, select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; margin: 8px 0 16px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div id="project-title" style="font-weight: 600; font-size: 1.2rem;">My Show</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="openShowManager()"><span class="material-symbols-rounded">folder</span></button>
        <button class="btn btn-primary" onclick="$('file-input').click()"><span class="material-symbols-rounded">add</span> Add</button>
    </div>
</header>

<input type="file" id="file-input" multiple accept="audio/*" class="hidden" onchange="handleFiles(this)">
<input type="file" id="import-input" accept=".magic" class="hidden" onchange="importShow(this)">

<div class="cue-list" id="cue-list"></div>

<div class="modal" id="edit-show-modal">
    <div class="modal-content">
        <h2 id="modal-title">Show Settings</h2>
        <label>Show Name</label>
        <input type="text" id="edit-proj-name">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn btn-primary" id="export-btn" onclick="exportShow()"><span class="material-symbols-rounded">download</span> Export Show (.magic)</button>
            <button class="btn" onclick="$('import-input').click()"><span class="material-symbols-rounded">upload</span> Import Show</button>
            <button class="btn btn-danger" onclick="deleteShow()"><span class="material-symbols-rounded">delete</span> Delete Show</button>
            <button class="btn" onclick="closeModal('edit-show-modal')" style="width: 100%; justify-content: center;">Close</button>
        </div>
    </div>
</div>

<div class="modal" id="manager-modal">
    <div class="modal-content">
        <h2>Your Shows</h2>
        <div id="projects-container" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;"></div>
        <button class="btn btn-primary" onclick="createNewShow()" style="width: 100%; justify-content: center;"><span class="material-symbols-rounded">add_circle</span> New Show</button>
        <button class="btn" onclick="closeModal('manager-modal')" style="width: 100%; justify-content: center; margin-top: 10px;">Close</button>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    let db, curProjId = 'proj_default', editProjId = null;
    let projectsList = [{id: 'proj_default', name: 'My Show'}];
    let tracks = [];
    let activeAudios = {};

    // IndexedDB Setup
    const request = indexedDB.open('MagicCueDB', 3);
    request.onupgradeneeded = e => {
        db = e.target.result;
        if(!db.objectStoreNames.contains('store')) db.createObjectStore('store');
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadProjects();
    };

    async function loadProjects() {
        let list = await getDB('projectList');
        if(list) projectsList = list;
        let lastId = await getDB('lastProjectId');
        if(lastId) curProjId = lastId;
        switchProject(curProjId);
    }

    async function switchProject(id) {
        curProjId = id;
        saveDB('lastProjectId', id);
        let p = projectsList.find(x => x.id === id);
        $('project-title').innerText = p ? p.name : 'Unknown';
        tracks = await getDB(id) || [];
        render();
        closeModal('manager-modal');
    }

    const handleFiles = async inp => { 
        for(let f of Array.from(inp.files)){
            let ab = await f.arrayBuffer(); 
            let blob = new Blob([ab], {type: f.type});
            tracks.push({
                id: 'id' + Date.now() + Math.random().toString(36).substr(2,5),
                name: f.name.replace(/\.[^/.]+$/,""),
                blobUrl: URL.createObjectURL(blob),
                file: blob, // Store the actual data
                volume: 1, delay: 0, fadeIn: 0, fadeOut: 0, 
                trimStart: 0, trimEnd: 0, autoFollow: false, 
                overlap: 0, postDelay: 0
            });
        }
        render(); saveData(); inp.value = ''; 
    };

    function render() {
        const container = $('cue-list');
        container.innerHTML = tracks.map((t, i) => `
            <div class="cue-card">
                <button class="play-btn" onclick="playTrack('${t.id}')">
                    <span class="material-symbols-rounded" id="icon-${t.id}">play_arrow</span>
                </button>
                <div class="cue-info">
                    <div class="cue-name">${t.name}</div>
                    <div class="cue-meta">
                        <span>Cue ${i+1}</span>
                        <span>${t.autoFollow ? 'Auto-Next' : 'Manual'}</span>
                    </div>
                </div>
                <button class="btn" onclick="deleteTrack('${t.id}')"><span class="material-symbols-rounded">delete</span></button>
            </div>
        `).join('');
    }

    function playTrack(id) {
        const t = tracks.find(x => x.id === id);
        if(!t) return;
        
        if(activeAudios[id]) {
            activeAudios[id].pause();
            delete activeAudios[id];
            $(`icon-${id}`).innerText = 'play_arrow';
            return;
        }

        const a = new Audio(t.blobUrl);
        a.volume = t.volume;
        activeAudios[id] = a;
        $(`icon-${id}`).innerText = 'stop';
        
        a.onended = () => {
            $(`icon-${id}`).innerText = 'play_arrow';
            delete activeAudios[id];
        };
        a.play();
    }

    // --- DATA EXPORT / IMPORT ENGINE ---
    const fileToBase64 = file => new Promise((resolve, reject) => {
        let reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    const exportShow = async () => {
        let p = projectsList.find(x => x.id === editProjId); if(!p) return;
        let btn = $('export-btn'); let ogHtml = btn.innerHTML;
        btn.innerHTML = 'Packaging Show...'; btn.style.pointerEvents = 'none';

        try {
            let exportData = { name: p.name, tracks: [] };
            for(let t of tracks) {
                let b64 = await fileToBase64(t.file);
                exportData.tracks.push({ ...t, file: b64, blobUrl: null });
            }
            let blob = new Blob([JSON.stringify(exportData)], {type: "application/json"});
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url; a.download = `${p.name}.magic`; a.click();
        } catch (err) { alert("Export failed: " + err); }
        
        btn.innerHTML = ogHtml; btn.style.pointerEvents = 'auto';
    };

    const importShow = async (inp) => {
        if(!inp.files.length) return;
        try {
            let text = await inp.files[0].text();
            let data = JSON.parse(text);
            let nId = 'proj_' + Date.now();
            let importedTracks = [];
            for(let t of data.tracks) {
                let res = await fetch(t.file);
                let blob = await res.blob();
                importedTracks.push({...t, file: blob, blobUrl: URL.createObjectURL(blob)}); 
            }
            projectsList.push({id: nId, name: data.name || "Imported"});
            saveDB('projectList', projectsList);
            saveDB(nId, importedTracks);
            switchProject(nId);
        } catch(err) { alert("Import failed."); }
    };

    // Helper DB functions
    function saveDB(key, val) {
        if(!db) return;
        db.transaction('store', 'readwrite').objectStore('store').put(val, key);
    }
    function getDB(key) {
        return new Promise(res => {
            let req = db.transaction('store').objectStore('store').get(key);
            req.onsuccess = () => res(req.result);
        });
    }
    function saveData() { saveDB(curProjId, tracks); }
    function deleteTrack(id) { tracks = tracks.filter(x => x.id !== id); render(); saveData(); }
    function openShowManager() {
        editProjId = curProjId;
        $('edit-proj-name').value = projectsList.find(x => x.id === curProjId).name;
        $('manager-modal').classList.add('active');
        renderProjects();
    }
    function renderProjects() {
        $('projects-container').innerHTML = projectsList.map(p => `
            <div style="display:flex; gap:10px; align-items:center; background:#334155; padding:10px; border-radius:8px;">
                <div style="flex:1" onclick="switchProject('${p.id}')">${p.name}</div>
                <button class="btn" onclick="editShowSettings('${p.id}')"><span class="material-symbols-rounded">settings</span></button>
            </div>
        `).join('');
    }
    function editShowSettings(id) {
        editProjId = id;
        $('edit-proj-name').value = projectsList.find(x => x.id === id).name;
        $('edit-show-modal').classList.add('active');
    }
    function createNewShow() {
        let nId = 'proj_' + Date.now();
        projectsList.push({id: nId, name: "New Show"});
        saveDB('projectList', projectsList);
        switchProject(nId);
    }
    function closeModal(id) { $(id).classList.remove('active'); }
</script>
</body>
</html>
